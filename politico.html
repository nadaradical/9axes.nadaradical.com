<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Perfil Político | 9Axes Portugal</title>
  <link href="https://fonts.googleapis.com/css?family=Montserrat:300,400,700|Roboto:400,700" rel="stylesheet">
  <link href="style.css" rel="stylesheet" type="text/css">
  <link rel="icon" type="x-icon" href="icon.png">
  <link rel="shortcut icon" type="x-icon" href="icon.png">
</head>
<body class="results-page politico-page">
  <div class="results-shell">
    <header class="results-header politico-header">
      <p class="politico-kicker">Análise individual · 9 eixos</p>
      <div class="politico-profile-row">
        <img id="politico-foto" class="politico-foto" alt="Foto do político" hidden>
        <div class="politico-header-copy">
          <h1 id="politico-nome">A carregar perfil...</h1>
          <p class="results-subtitle" id="politico-partido"></p>
          <a id="politico-bio-link" class="politico-bio-link" href="#" target="_blank" rel="noopener noreferrer" hidden>Ver biografia na Assembleia da República</a>
        </div>
      </div>
    </header>

    <div id="politico-content" hidden>
      <h2><span class="weight-300" id="a-label"></span></h2>
      <div class="axis">
        <img src="value_images/federal.png" alt="Federalismo" />
        <div class="bar federal" id="bar-federal"><div class="text-wrapper" id="federal"></div></div>
        <div class="bar unitary" id="bar-unitary"><div class="text-wrapper" id="unitary"></div></div>
        <img src="value_images/unitary.png" alt="Unitarismo" />
      </div>

      <h2><span class="weight-300" id="b-label"></span></h2>
      <div class="axis">
        <img src="value_images/democracy.png" alt="Democracia" />
        <div class="bar democratic" id="bar-democratic"><div class="text-wrapper" id="democratic"></div></div>
        <div class="bar authority" id="bar-authority"><div class="text-wrapper" id="authority"></div></div>
        <img src="value_images/authority.png" alt="Autoridade" />
      </div>

      <h2><span class="weight-300" id="c-label"></span></h2>
      <div class="axis">
        <img src="value_images/globalist.png" alt="Globalismo" />
        <div class="bar globalist" id="bar-globalist"><div class="text-wrapper" id="globalist"></div></div>
        <div class="bar isolation" id="bar-isolation"><div class="text-wrapper" id="isolation"></div></div>
        <img src="value_images/isolationist.png" alt="Isolacionismo" />
      </div>

      <h2><span class="weight-300" id="d-label"></span></h2>
      <div class="axis">
        <img src="value_images/militarist.png" alt="Militarismo" />
        <div class="bar militarist" id="bar-militarist"><div class="text-wrapper" id="militarist"></div></div>
        <div class="bar pacifist" id="bar-pacifist"><div class="text-wrapper" id="pacifist"></div></div>
        <img src="value_images/pacifist.png" alt="Pacifismo" />
      </div>

      <h2><span class="weight-300" id="e-label"></span></h2>
      <div class="axis">
        <img src="value_images/security.png" alt="Segurança" />
        <div class="bar security" id="bar-security"><div class="text-wrapper" id="security"></div></div>
        <div class="bar freedom" id="bar-freedom"><div class="text-wrapper" id="freedom"></div></div>
        <img src="value_images/freedom.png" alt="Liberdade" />
      </div>

      <h2><span class="weight-300" id="f-label"></span></h2>
      <div class="axis">
        <img src="value_images/equality.png" alt="Igualdade" />
        <div class="bar equality" id="bar-equality"><div class="text-wrapper" id="equality"></div></div>
        <div class="bar markets" id="bar-markets"><div class="text-wrapper" id="markets"></div></div>
        <img src="value_images/markets.png" alt="Mercado" />
      </div>

      <h2><span class="weight-300" id="g-label"></span></h2>
      <div class="axis">
        <img src="value_images/secular.png" alt="Secular" />
        <div class="bar secular" id="bar-secular"><div class="text-wrapper" id="secular"></div></div>
        <div class="bar religious" id="bar-religious"><div class="text-wrapper" id="religious"></div></div>
        <img src="value_images/religious.png" alt="Religioso" />
      </div>

      <h2><span class="weight-300" id="h-label"></span></h2>
      <div class="axis">
        <img src="value_images/progress.png" alt="Progressista" />
        <div class="bar progress" id="bar-progress"><div class="text-wrapper" id="progress"></div></div>
        <div class="bar tradition" id="bar-tradition"><div class="text-wrapper" id="tradition"></div></div>
        <img src="value_images/tradition.png" alt="Tradicional" />
      </div>

      <h2><span class="weight-300" id="i-label"></span></h2>
      <div class="axis">
        <img src="value_images/assimilationist.png" alt="Assimilação" />
        <div class="bar assimilation" id="bar-assimilation"><div class="text-wrapper" id="assimilation"></div></div>
        <div class="bar multiculture" id="bar-multiculture"><div class="text-wrapper" id="multiculture"></div></div>
        <img src="value_images/multiculturalist.png" alt="Multiculturalismo" />
      </div>
    </div>

    <p id="error-message" class="politico-error" hidden></p>
  </div>

  <script>
    function getQueryVariable(variable) {
      var query = window.location.search.substring(1);
      var vars = query.split("&");
      for (var i = 0; i < vars.length; i++) {
        var pair = vars[i].split("=");
        if (pair[0] === variable) { return decodeURIComponent(pair[1] || ""); }
      }
      return "";
    }

    function showError(message) {
      document.getElementById("error-message").hidden = false;
      document.getElementById("error-message").textContent = message;
      document.getElementById("politico-nome").textContent = "Não foi possível carregar";
      document.getElementById("politico-partido").textContent = "";
    }

    function setBarValue(name, value) {
      var innerel = document.getElementById(name);
      var outerel = document.getElementById("bar-" + name);
      outerel.style.width = value + "%";
      innerel.textContent = value + "%";
      if (innerel.offsetWidth + 20 > outerel.offsetWidth) {
        innerel.style.visibility = "hidden";
      }
    }

    var diviArray = ["Separatista", "Confederalista", "Descentralista", "Neutro", "Devolucionista", "Centralista", "Unitário"];
    var govtArray = ["Anarquista", "Libertário", "Liberal", "Moderado", "Estatista", "Autoritário", "Totalitário"];
    var diplArray = ["Cosmopolitano", "Internacionalista", "Conformista", "Equilibrado", "Patriótico", "Nacionalista", "Chauvinista"];
    var miliArray = ["Junta Militar", "Militarista", "Paramilitarista", "Militar Democrata", "Neutro", "Anti-Militarista", "Pacifista"];
    var protArray = ["Vigilância em massa Global", "Vigilância em massa", "Vigilância Policial", "Neutro", "Privacidade do Governo", "Privacidade do Governo e Corporações", "Privacidade Total"];
    var econArray = ["Comunista", "Socialista", "Social Democrata", "Centrista", "Apoiante de Livre Mercado", "Capitalista", "Laissez-Faire"];
    var reliArray = ["Anticlericalista", "Laicista", "Secularista", "Neutro", "Etocrata", "Teocrata", "Clericalista"];
    var sctyArray = ["Revolucionário", "Muito Progressista", "Progressista", "Neutro", "Tradicional", "Conservador", "Reacionário"];
    var cultArray = ["Monoculturalista", "Multicomunitarista", "Interculturalista", "Neutro", "Assimilacionista", "Multiculturalista", "Intraculturalista"];

    function setCLabel(val, ary) {
      if (val > 90) { return ary[0]; }
      if (val > 75) { return ary[1]; }
      if (val > 60) { return ary[2]; }
      if (val >= 40) { return ary[3]; }
      if (val >= 25) { return ary[4]; }
      if (val >= 10) { return ary[5]; }
      return ary[6];
    }

    function clampScore(value) {
      var parsed = Number(value);
      if (Number.isNaN(parsed)) {
        return NaN;
      }
      return Math.max(0, Math.min(100, Math.round(parsed)));
    }

    function resolveAssembleiaPhoto(data) {
      if (!data || !data.bidAssembleia) {
        return Promise.resolve(data && data.foto ? data.foto : "");
      }

      var bid = String(data.bidAssembleia).trim();
      if (!/^\d+$/.test(bid)) {
        return Promise.resolve(data.foto || "");
      }

      var candidates = [
        "https://www.parlamento.pt/DeputadoGP/Paginas/Fotografia.aspx?BID=" + bid,
        "https://www.parlamento.pt/DeputadoGP/Paginas/FotoDeputado.aspx?BID=" + bid,
        data.fotoAssembleia || "",
        data.foto || ""
      ].filter(Boolean);

      return new Promise(function (resolve) {
        var index = 0;

        function tryNext() {
          if (index >= candidates.length) {
            resolve("");
            return;
          }

          var candidate = candidates[index++];
          var probe = new Image();
          probe.referrerPolicy = "no-referrer";
          probe.onload = function () { resolve(candidate); };
          probe.onerror = tryNext;
          probe.src = candidate;
        }

        tryNext();
      });
    }

    async function renderPolitico(data) {
      var resultados = data.resultados || {};
      var divi = clampScore(resultados.divi);
      var govt = clampScore(resultados.govt);
      var dipl = clampScore(resultados.dipl);
      var mili = clampScore(resultados.mili);
      var prot = clampScore(resultados.prot);
      var econ = clampScore(resultados.econ);
      var reli = clampScore(resultados.reli);
      var scty = clampScore(resultados.scty);
      var cult = clampScore(resultados.cult);

      if ([divi, govt, dipl, mili, prot, econ, reli, scty, cult].some(Number.isNaN)) {
        showError("O ficheiro do político não contém resultados válidos.");
        return;
      }

      document.getElementById("politico-nome").textContent = data.nome || "Sem nome";
      document.getElementById("politico-partido").textContent = data.partido || "Sem partido";
      if (data.bidAssembleia) {
        var bioLink = document.getElementById("politico-bio-link");
        bioLink.href = "https://www.parlamento.pt/DeputadoGP/Paginas/Biografia.aspx?BID=" + String(data.bidAssembleia).trim();
        bioLink.hidden = false;
      }

      var resolvedPhoto = await resolveAssembleiaPhoto(data);
      if (resolvedPhoto) {
        var foto = document.getElementById("politico-foto");
        foto.src = resolvedPhoto;
        foto.hidden = false;
      }

      document.getElementById("a-label").textContent = setCLabel(divi, diviArray);
      document.getElementById("b-label").textContent = setCLabel(govt, govtArray);
      document.getElementById("c-label").textContent = setCLabel(dipl, diplArray);
      document.getElementById("d-label").textContent = setCLabel(mili, miliArray);
      document.getElementById("e-label").textContent = setCLabel(prot, protArray);
      document.getElementById("f-label").textContent = setCLabel(econ, econArray);
      document.getElementById("g-label").textContent = setCLabel(reli, reliArray);
      document.getElementById("h-label").textContent = setCLabel(scty, sctyArray);
      document.getElementById("i-label").textContent = setCLabel(cult, cultArray);

      setBarValue("federal", divi);
      setBarValue("unitary", 100 - divi);
      setBarValue("democratic", govt);
      setBarValue("authority", 100 - govt);
      setBarValue("globalist", dipl);
      setBarValue("isolation", 100 - dipl);
      setBarValue("militarist", mili);
      setBarValue("pacifist", 100 - mili);
      setBarValue("security", prot);
      setBarValue("freedom", 100 - prot);
      setBarValue("equality", econ);
      setBarValue("markets", 100 - econ);
      setBarValue("secular", reli);
      setBarValue("religious", 100 - reli);
      setBarValue("progress", scty);
      setBarValue("tradition", 100 - scty);
      setBarValue("assimilation", cult);
      setBarValue("multiculture", 100 - cult);

      document.getElementById("politico-content").hidden = false;
    }

    function loadPolitico() {
      var slug = getQueryVariable("r").trim().toLowerCase();
      if (!/^[a-z0-9_-]+$/.test(slug)) {
        showError("Parâmetro inválido. Use, por exemplo, ?r=carlosguimarenspinto");
        return;
      }

      var script = document.createElement("script");
      script.src = "politicos/" + slug + ".js";
      script.onload = function () {
        if (!window.politicoData) {
          showError("Ficheiro carregado sem dados do político.");
          return;
        }
        renderPolitico(window.politicoData);
      };
      script.onerror = function () {
        showError("Não foi possível encontrar esse político em /politicos/" + slug + ".js");
      };
      document.body.appendChild(script);
    }

    loadPolitico();
  </script>
</body>
</html>
