<script>
    var isMobile = {
           Android: function() {
                   return navigator.userAgent.match(/Android/i);
           },
           BlackBerry: function() {
                   return navigator.userAgent.match(/BlackBerry/i);
           },
           iOS: function() {
                   return navigator.userAgent.match(/iPhone|iPad|iPod/i);
           },
           Opera: function() {
                   return navigator.userAgent.match(/Opera Mini/i);
           },
           Windows: function() {
                   return navigator.userAgent.match(/IEMobile/i);
           },
           any: function() {
                   return (isMobile.Android() || isMobile.BlackBerry() || isMobile.iOS() || isMobile.Opera() || isMobile.Windows());
           }
    };
	
    var bannerReady = false

    function resultsdownload()
    {
           if (!bannerReady) {
                   return false;
           }

           var canvas = document.getElementsByTagName('canvas')[0];
           var link = document.getElementById('link');
           link.setAttribute('download', 'results.png');
           link.setAttribute('href', canvas.toDataURL("image/png").replace("image/png", "image/octet-stream"));

           if (!isMobile.any()) {
                   link.click();
                   return false;
           }

           return true;
    }
    
    function getQueryVariable(variable)
    {
           var query = window.location.search.substring(1)
           var vars = query.split("&")
           for (var i=0;i<vars.length;i++) {
                   var pair = vars[i].split("=")
                   if(pair[0] == variable) {return pair[1]}
           }
           return "";
    }

    function fromBase64Url(value) {
        var normalized = value.replace(/-/g, '+').replace(/_/g, '/');
        while (normalized.length % 4) {
            normalized += '=';
        }
        return atob(normalized);
    }

    function signPayload(payload) {
        var input = payload + "|9axes-share-v1|";
        var hash = 0;
        for (var i = 0; i < input.length; i++) {
            hash = ((hash << 5) - hash) + input.charCodeAt(i);
            hash |= 0;
        }
        return (hash >>> 0).toString(36);
    }

    function clampScore(value) {
        var parsed = Number(value);
        if (Number.isNaN(parsed)) {
            return NaN;
        }
        return Math.max(0, Math.min(100, Math.ceil(parsed)));
    }

    function loadValidatedScores() {
        var payload = getQueryVariable("r");
        var signature = getQueryVariable("s");
        if (!payload || !signature || signPayload(payload) !== signature) {
            return null;
        }

        try {
            var decoded = JSON.parse(fromBase64Url(payload));
            var keys = ["a", "b", "c", "d", "e", "f", "g", "h", "i"];
            var output = {};
            for (var i = 0; i < keys.length; i++) {
                var key = keys[i];
                var value = clampScore(decoded[key]);
                if (Number.isNaN(value)) {
                    return null;
                }
                output[key] = value;
            }
            return output;
        } catch (error) {
            return null;
        }
    }

    var scores = loadValidatedScores();
    if (!scores) {
        document.body.innerHTML = "<h1>9Eixos</h1><hr><center><h2>Link de resultados inválido ou alterado.</h2></center><br><button class=\"button\" onclick=\"location.href=\'index.html\';\" style=\"background-color: #f44336;\">Voltar</button>";
        throw new Error("Invalid share payload");
    }

    a  = scores.a
    b  = scores.b
    c  = scores.c
    d  = scores.d
    e  = scores.e
    f  = scores.f
    g  = scores.g
    h  = scores.h
    i  = scores.i
    a2 = 100-a;
    b2 = 100-b;
    c2 = 100-c;
    d2 = 100-d;
    e2 = 100-e;
    f2 = 100-f;
    g2 = 100-g;
    h2 = 100-h;
    i2 = 100-i;

    function setBarValue(name, value) {
        innerel = document.getElementById(name)
        outerel = document.getElementById("bar-" + name)
        outerel.style.width = (value + "%")
        innerel.innerHTML = (value + "%")
        if (innerel.offsetWidth + 20 > outerel.offsetWidth) {
            innerel.style.visibility = "hidden"
        }
    }

    diviArray = ["Independentista","Confederalista","Descentralista","Neutro","Regionalista","Centralista","Unitário"]
    govtArray = ["Anarquista","Libertário","Liberal","Moderado","Autoritário","Muito Autoritário","Totalitário"]
    diplArray = ["Cosmopolitano","Internacionalista","Globalista","Equilibrado","Patriótico","Nacionalista","Chauvinista"]
    miliArray = ["Belicista","Militarista","Intervencionista","Neutro","Defensivista","Anti-Militarista","Pacifista"]
    protArray = ["Estado de Vigilância Total","Vigilância em Massa","Segurança Forte","Neutro","Liberdades Civis","Privacidade Forte","Privacidade Absoluta"]
    econArray = ["Comunista","Socialista","Social Democrata","Centrista","Liberal Económico","Capitalista","Laissez-Faire"]
    reliArray = ["Anticlericalista","Laicista","Secular","Neutro","Etocrata","Clericalista","Teocrata"]
    sctyArray = ["Revolucionário","Muito Progressista","Progressista","Neutro","Tradicional","Conservador","Reacionário"]
    cultArray = ["Assimilacionista Forte","Assimilacionista","Integracionista","Neutro","Multicultural","Multiculturalista","Cosmopolita Cultural"]

    function setCLabel(val,ary) {
        if (val > 100) { return "" } else
        if (val > 90) { return ary[0] } else
        if (val > 75) { return ary[1] } else
        if (val > 60) { return ary[2] } else
        if (val >= 40) { return ary[3] } else
        if (val >= 25) { return ary[4] } else
        if (val >= 10) { return ary[5] } else
        if (val >= 0) { return ary[6] } else
                {return ""}
    }

    setBarValue("federal", a)
    setBarValue("unitary", a2)
    setBarValue("democratic", b)
    setBarValue("authority", b2)
    setBarValue("globalist", c)
    setBarValue("isolation", c2)
    setBarValue("militarist", d)
    setBarValue("pacifist", d2)
    setBarValue("security", e)
    setBarValue("freedom", e2)
    setBarValue("equality", f)
    setBarValue("markets", f2)
    setBarValue("secular", g)
    setBarValue("religious", g2)
    setBarValue("progress", h)
    setBarValue("tradition", h2)
    setBarValue("assimilation", i)
    setBarValue("multiculture", i2)
    
    document.getElementById("a-label").innerHTML = setCLabel(a, diviArray)
    document.getElementById("b-label").innerHTML = setCLabel(b, govtArray)
    document.getElementById("c-label").innerHTML = setCLabel(c, diplArray)
    document.getElementById("d-label").innerHTML = setCLabel(d, miliArray)
    document.getElementById("e-label").innerHTML = setCLabel(e, protArray)
    document.getElementById("f-label").innerHTML = setCLabel(f, econArray)
    document.getElementById("g-label").innerHTML = setCLabel(g, reliArray)
    document.getElementById("h-label").innerHTML = setCLabel(h, sctyArray)
    document.getElementById("i-label").innerHTML = setCLabel(i, cultArray)

    function vectorDistance(stats, user) {
        var player = [user.divi, user.govt, user.dipl, user.mili, user.prot, user.econ, user.reli, user.scty, user.cult]
        var ideology = [stats.divi, stats.govt, stats.dipl, stats.mili, stats.prot, stats.econ, stats.reli, stats.scty, stats.cult]
        var distance = 0
        for (var idx = 0; idx < player.length; idx++) {
            distance += Math.pow(player[idx] - ideology[idx], 2)
        }
        return Math.sqrt(distance)
    }

    function similarityFromDistance(distance) {
        var maxDistance = Math.sqrt(9 * Math.pow(100, 2))
        var similarity = Math.ceil((1 - (distance / maxDistance)) * 100)
        return Math.max(0, Math.min(100, similarity))
    }

    var userStats = {
        divi: a,
        govt: b,
        dipl: c,
        mili: d,
        prot: e,
        econ: f,
        reli: g,
        scty: h,
        cult: i
    }
	
    party = ""
    partydist = Infinity
    for (var pari = 0; pari < parties.length; pari++) {
        dist = vectorDistance(parties[pari].stats, userStats)
        if (dist < partydist) {
            party = parties[pari].name
            partydist = dist
        }
    }

    ideology = ""
    ideologyDist = Infinity
    for (var idi = 0; idi < ideologies.length; idi++) {
        idist = vectorDistance(ideologies[idi].stats, userStats)
        if (idist < ideologyDist) {
            ideology = ideologies[idi].name
            ideologyDist = idist
        }
    }

    partySimilarityText = similarityFromDistance(partydist) + "%"
    ideologySimilarityText = similarityFromDistance(ideologyDist) + "%"

    document.getElementById("party-label").innerHTML = party
	document.getElementById("party-similarity").innerHTML = partySimilarityText
    document.getElementById("ideology-label").innerHTML = ideology
    document.getElementById("ideology-similarity").innerHTML = ideologySimilarityText

    function createImage(src, x, y, w, h) {
        img = new Image ()
        img.src = src
        img.onLoad = function() {
            ctx.drawImage(img, x, y, w, h)
        }
    }

    function waitForImage(imageId) {
        return new Promise(function(resolve) {
            var image = document.getElementById(imageId)
            if (image.complete && image.naturalWidth > 0) {
                resolve()
                return
            }
            image.onload = function() { resolve() }
            image.onerror = function() { resolve() }
        })
    }

    function setSharePreview() {
        var resultUrl = window.location.href
        var baseOrigin = window.location.origin
        var shareImageUrl = new URL("/banner.png", baseOrigin).href

        var ogUrl = document.getElementById("og-url-meta")
        var ogImage = document.getElementById("og-image-meta")
        var twitterDomain = document.getElementById("twitter-domain-meta")
        var twitterUrl = document.getElementById("twitter-url-meta")
        var twitterImage = document.getElementById("twitter-image-meta")
        if (ogUrl) { ogUrl.setAttribute("content", resultUrl) }
        if (ogImage) { ogImage.setAttribute("content", shareImageUrl) }
        if (twitterDomain) { twitterDomain.setAttribute("content", window.location.hostname) }
        if (twitterUrl) { twitterUrl.setAttribute("content", resultUrl) }
        if (twitterImage) { twitterImage.setAttribute("content", shareImageUrl) }

        var shareTitle = "9Eixos: " + party + " · " + ideology
        var shareDescription = "Partido mais próximo: " + party + " (" + partySimilarityText + ") · Ideologia: " + ideology + " (" + ideologySimilarityText + ")"

        document.title = shareTitle

        var ogTitle = document.querySelector('meta[property="og:title"]')
        var ogDescription = document.querySelector('meta[property="og:description"]')
        var twitterTitle = document.getElementById("twitter-title-meta")
        var twitterDescription = document.getElementById("twitter-description-meta")
        if (ogTitle) { ogTitle.setAttribute("content", shareTitle) }
        if (ogDescription) { ogDescription.setAttribute("content", shareDescription) }
        if (twitterTitle) { twitterTitle.setAttribute("content", shareTitle) }
        if (twitterDescription) { twitterDescription.setAttribute("content", shareDescription) }
    }

    window.onload = async function() {
        var c = document.getElementById("banner")
        var ctx = c.getContext("2d")
        var imageIds = [
            "img-federal", "img-unitary", "img-democratic", "img-authority",
            "img-globalist", "img-isolation", "img-militarist", "img-pacifist",
            "img-security", "img-freedom", "img-equality", "img-markets",
            "img-secular", "img-religious", "img-progress", "img-tradition",
            "img-assimilation", "img-multiculture"
        ]
        await Promise.all(imageIds.map(waitForImage))

        var gradient = ctx.createLinearGradient(0, 0, 0, 1380)
        gradient.addColorStop(0, "#F5F7FA")
        gradient.addColorStop(1, "#ECEFF5")
        ctx.fillStyle = gradient
        ctx.fillRect(0, 0, 800, 1380)

        function roundRect(x, y, width, height, radius) {
            ctx.beginPath()
            ctx.moveTo(x + radius, y)
            ctx.lineTo(x + width - radius, y)
            ctx.quadraticCurveTo(x + width, y, x + width, y + radius)
            ctx.lineTo(x + width, y + height - radius)
            ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height)
            ctx.lineTo(x + radius, y + height)
            ctx.quadraticCurveTo(x, y + height, x, y + height - radius)
            ctx.lineTo(x, y + radius)
            ctx.quadraticCurveTo(x, y, x + radius, y)
            ctx.closePath()
        }

        function drawFittedText(text, x, y, maxWidth, minSize, maxSize, weight, align) {
            var size = maxSize
            ctx.textAlign = align
            while (size > minSize) {
                ctx.font = weight + " " + size + "px Montserrat"
                if (ctx.measureText(text).width <= maxWidth) {
                    break
                }
                size -= 1
            }
            ctx.fillText(text, x, y)
        }

        var axes = [
            { leftImg: "img-federal", rightImg: "img-unitary", labelId: "a-label", leftValue: a, rightValue: a2, leftColor: "#ffeb3b", rightColor: "#f44336" },
            { leftImg: "img-democratic", rightImg: "img-authority", labelId: "b-label", leftValue: b, rightValue: b2, leftColor: "#00897b", rightColor: "#ff9800" },
            { leftImg: "img-globalist", rightImg: "img-isolation", labelId: "c-label", leftValue: 100 - c2, rightValue: c2, leftColor: "#03a9f4", rightColor: "#9c27b0" },
            { leftImg: "img-militarist", rightImg: "img-pacifist", labelId: "d-label", leftValue: d, rightValue: d2, leftColor: "#8bc34a", rightColor: "#ea90ab" },
            { leftImg: "img-security", rightImg: "img-freedom", labelId: "e-label", leftValue: e, rightValue: e2, leftColor: "#3f51b5", rightColor: "#ffeb3b" },
            { leftImg: "img-equality", rightImg: "img-markets", labelId: "f-label", leftValue: f, rightValue: f2, leftColor: "#f44336", rightColor: "#00897b" },
            { leftImg: "img-secular", rightImg: "img-religious", labelId: "g-label", leftValue: g, rightValue: g2, leftColor: "#ff9800", rightColor: "#03a9f4" },
            { leftImg: "img-progress", rightImg: "img-tradition", labelId: "h-label", leftValue: h, rightValue: h2, leftColor: "#9c27b0", rightColor: "#8bc34a" },
            { leftImg: "img-assimilation", rightImg: "img-multiculture", labelId: "i-label", leftValue: i, rightValue: i2, leftColor: "#ea90ab", rightColor: "#3f51b5" }
        ]

        ctx.fillStyle = "#222222"
        ctx.font = "700 64px Montserrat"
        ctx.textAlign = "left"
        ctx.fillText("9Eixos", 20, 86)
        ctx.font = "400 30px Montserrat"
        ctx.fillStyle = "#455A64"
        ctx.fillText("Resultado pessoal", 22, 124)
        ctx.textAlign = "right"
        ctx.fillText(version, 780, 86)

        var rowTop = 162
        var rowGap = 112

        axes.forEach(function(axis, index) {
            var y = rowTop + (index * rowGap)

            ctx.fillStyle = "#FFFFFF"
            roundRect(114, y - 8, 572, 96, 14)
            ctx.fill()

            img = document.getElementById(axis.leftImg)
            ctx.drawImage(img, 20, y - 10, 100, 100)
            img = document.getElementById(axis.rightImg)
            ctx.drawImage(img, 680, y - 10, 100, 100)

            ctx.fillStyle = "#263238"
            roundRect(120, y, 560, 80, 10)
            ctx.fill()

            ctx.fillStyle = axis.leftColor
            ctx.fillRect(124, y + 4, (5.6 * axis.leftValue) - 6, 72)
            ctx.fillStyle = axis.rightColor
            ctx.fillRect(682 - (5.6 * axis.rightValue), y + 4, (5.6 * axis.rightValue) - 6, 72)

            ctx.fillStyle = "#FFFFFF"
            ctx.font = "700 48px Montserrat"
            ctx.textAlign = "left"
            if (axis.leftValue > 20) { ctx.fillText(axis.leftValue + "%", 132, y + 57.5) }
            ctx.textAlign = "right"
            if (axis.rightValue > 20) { ctx.fillText(axis.rightValue + "%", 668, y + 57.5) }

            // Removido texto de classificação (ex.: "Neutro", "Centrista")
            // para reduzir ruído visual na imagem partilhada.
        })

        ctx.fillStyle = "#1F2937"
        roundRect(20, 1218, 760, 142, 16)
        ctx.fill()
        ctx.fillStyle = "#FFFFFF"

        drawFittedText("Partido mais próximo", 40, 1262, 290, 22, 32, "700", "left")
        drawFittedText("Ideologia mais próxima", 40, 1330, 290, 22, 32, "700", "left")
        drawFittedText(party + " (" + partySimilarityText + ")", 760, 1262, 430, 20, 34, "400", "right")
        drawFittedText(ideology + " (" + ideologySimilarityText + ")", 760, 1330, 430, 20, 34, "400", "right")

        ctx.fillStyle = "#607D8B"
        ctx.font = "400 22px Montserrat"
        ctx.textAlign = "center"
        ctx.fillText("Faça o teste em 9eixos.org", 400, 1204)

		setSharePreview()

        bannerReady = true
        document.getElementById("save-results-button").disabled = false
    }
    </script>
