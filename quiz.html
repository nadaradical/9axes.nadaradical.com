<head>
<link href="https://fonts.googleapis.com/css?family=Montserrat:300,400,700|Roboto:400,700" rel="stylesheet">
<link href='style.css?v=20260312b' rel='stylesheet' type='text/css'>
<title>Quiz - 9Axes</title>
<link rel="icon" type="x-icon" href="icon.png">
<link rel="shortcut icon" type="x-icon" href="icon.png">
<meta charset="utf-8">
</head>
<body class="quiz-page">
<script type="application/javascript" src="questions.js"></script>

<div class="quiz-shell">
    <section class="quiz-header">
        <h1>9Axes</h1>
        <p class="quiz-subtitle">Versão curta · 72 questões</p>
        <h2 id="question-number">A carregar...</h2>
    </section>

    <p class="question" id="question-text"></p>

    <section class="answer-grid">
        <button class="button answer-button answer-strong-agree" onclick="next_question( 2)">Concordo Fortemente</button> <br>
        <button class="button answer-button answer-agree" onclick="next_question( 1)">Concordo</button> <br>
        <button class="button answer-button answer-neutral" onclick="next_question( 0)">Neutro / Incerto</button> <br>
        <button class="button answer-button answer-disagree" onclick="next_question(-1)">Discordo</button> <br>
        <button class="button answer-button answer-strong-disagree" onclick="next_question(-2)">Discordo Fortemente</button> <br>
    </section>

    <section class="quiz-actions">
        <button class="small_button" onclick="prev_question()" id="back_button">Voltar</button>
        <button class="small_button_off" id="back_button_off">Voltar</button><br>
    </section>
</div>

<script>
    var scores = [0, 0, 0, 0, 0, 0, 0, 0, 0];//fed, dem, glo, mil, fre, equ, sec, pro, mul - User's scores
    var qn = 0; // Question number
    var answers = [];
    var quests = [];
    init_all_questions(quests);
    init_question(quests);
    
    function init_all_questions(qs) {
        for(var i = 0; i < 9; i++) //Number of Axes
        {
            var c = Math.random()<0.5;
            for(var j = 0; j < 8; j++) //Number of questions per axis
            {
                var bucket = c ? j : (7-j);
                var m = [i, bucket, Math.floor(Math.random()*questions[i][bucket].length)];
                qs.push(m);
            }
        }
        shuffle(qs);
    }
    
    function init_question() {
        var ax = quests[qn][0];
        var rate = quests[qn][1];
        var num = quests[qn][2];
        document.getElementById("question-text").innerHTML = questions[ax][rate][num];
        document.getElementById("question-number").innerHTML = "Questão " + (qn + 1) + " de " + (quests.length);
        if (qn == 0) {
            document.getElementById("back_button").style.display = 'none';
            document.getElementById("back_button_off").style.display = 'block';
        } else {
            document.getElementById("back_button").style.display = 'block';
            document.getElementById("back_button_off").style.display = 'none';
        }

    }

    function shuffle(array) {
      var currentIndex = array.length, temporaryValue, randomIndex;

      // While there remain elements to shuffle...
      while (0 !== currentIndex) {

        // Pick a remaining element...
        randomIndex = Math.floor(Math.random() * currentIndex);
        currentIndex -= 1;

        // And swap it with the current element.
        temporaryValue = array[currentIndex];
        array[currentIndex] = array[randomIndex];
        array[randomIndex] = temporaryValue;
      }

      return array;
    }

    function next_question(mult) {
        var ax = quests[qn][0];
        var rate = quests[qn][1];
        var num = quests[qn][2];
        scores[ax] += mult*(rate<4?1:-1);
        
        answers[qn] = mult;
        qn++;
        if (qn < quests.length) {
            init_question();
        } else {
            results();
        }
    }
    function prev_question() {
        if (qn == 0) {
            return;
        }
        qn--;
        var ax = quests[qn][0];
        var rate = quests[qn][1];
        var num = quests[qn][2];
        scores[ax] -= answers[qn]*(rate<4?1:-1);
        init_question();
    }
    function calc_score(score) {
        return (50+5*score);
    }

    function toBase64Url(value) {
        return btoa(value).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
    }

    function signPayload(payload) {
        var input = payload + "|9axes-share-v1|";
        var hash = 0;
        for (var i = 0; i < input.length; i++) {
            hash = ((hash << 5) - hash) + input.charCodeAt(i);
            hash |= 0;
        }
        return (hash >>> 0).toString(36);
    }

    function results() {
        var scoreData = {
            a: calc_score(scores[0]),
            b: calc_score(scores[1]),
            c: calc_score(scores[2]),
            d: calc_score(scores[3]),
            e: calc_score(scores[4]),
            f: calc_score(scores[5]),
            g: calc_score(scores[6]),
            h: calc_score(scores[7]),
            i: calc_score(scores[8])
        };
        var payload = toBase64Url(JSON.stringify(scoreData));
        var signature = signPayload(payload);
        location.href = `results.html?r=${payload}&s=${signature}`;
    }
</script>
</body>
